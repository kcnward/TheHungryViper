<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE HUNGRY VIPER</title>
    <script type="module" crossorigin src="./assets/index-B37IESSM.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-HrwI_qxf.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>THE HUNGRY VIPER</h1>
        <p id="sessionLine" class="session-line" aria-live="polite"></p>
        <p class="actions">
          <button type="button" id="btnLogin" class="waitlist-button">Sign in (Solid)</button>
          <button type="button" id="btnLogout" class="waitlist-button secondary" hidden>Sign out</button>
        </p>
      </header>

      <div class="content">
        <form id="waitlistForm" class="card" hidden>
          <label> Name <input name="name" type="text" required autocomplete="name" /> </label>
          <label> Email <input name="email" type="email" required autocomplete="email" /> </label>
          <label> Note (optional) <textarea name="note" rows="3" maxlength="2000"></textarea> </label>
          <button type="submit" class="waitlist-button">Save to my pod</button>
        </form>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </div>

      <footer>
        <p>&copy; 2026 Happy Girl. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
